<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#070A12" />
  <title>Gravity Maze</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <canvas id="game"></canvas>

  <!-- HUD (oben schwebend) -->
  <div class="hud">
    <div class="hud-brand">⚫ Gravity Maze</div>
    <div class="hud-stats">
      <span class="stat"><span class="stat-label">Score</span><b id="score">0</b></span>
      <span class="stat"><span class="stat-label">Coins</span><b id="coins">0/0</b></span>
      <span class="stat"><span class="stat-label">Zeit</span><b id="time">0.0s</b></span>
    </div>
  </div>

  <!-- Gyro-Badge -->
  <div id="gyroBadge" class="gyro-badge hidden">📡 Gyro aktiv</div>

  <!-- Steuerleiste (unten) -->
  <div class="ctrl-bar">
    <button id="btnGyro"    class="cbtn"        title="Gyroskop ein/aus">📡 Gyro</button>
    <button id="btnCalib"   class="cbtn ghost hidden" title="Neu kalibrieren">📐 Kalib.</button>
    <button id="btnFlipY"   class="cbtn ghost hidden" title="Y-Richtung umkehren">↕ Y-Flip</button>
    <button id="btnRestart" class="cbtn" disabled>↺ Neustart</button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Start-/Game-Over-Overlay -->
  <div id="overlay" class="overlay">
    <div class="card">
      <h1>⚫ Gravity Maze</h1>
      <p class="muted">
        Neige dein Handy (<b>📡 Gyro</b>-Button), ziehe mit dem Finger oder
        benutze <b>WASD</b> / Pfeiltasten.<br><br>
        Sammle <span class="gold">Münzen</span> &amp; erreiche das
        <span class="green">Ziel</span>. Meide die <span class="purple">Löcher</span>!
      </p>
      <div class="btnrow">
        <button id="btnStart" class="cbtn primary">▶ Starten</button>
      </div>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script src="/static/main.js" defer></script>
</body>
</html>
