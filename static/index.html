<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#070A12" />
  <title>Gravity Maze</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <!-- Full-screen game canvas -->
  <canvas id="game"></canvas>

  <!-- HUD floating over canvas -->
  <div class="hud">
    <div class="hud-brand">⚫ Gravity Maze</div>
    <div class="hud-stats">
      <span class="stat"><span class="stat-label">Score</span><b id="score">0</b></span>
      <span class="stat"><span class="stat-label">Coins</span><b id="coins">0/0</b></span>
      <span class="stat"><span class="stat-label">Zeit</span><b id="time">0.0s</b></span>
    </div>
  </div>

  <!-- Gyro indicator badge (shown when gyro is active) -->
  <div id="gyroBadge" class="gyro-badge hidden">📡 Gyro aktiv</div>

  <!-- Bottom control bar -->
  <div class="ctrl-bar">
    <button id="btnGyro"  class="cbtn"  title="Gyroskop ein/aus">📡 Gyro</button>
    <button id="btnCalib" class="cbtn ghost hidden" title="Aktuelle Position als Nulllage kalibrieren">📐 Kalib.</button>
    <button id="btnRestart" class="cbtn" disabled>↺ Neustart</button>
  </div>

  <!-- Toast for brief notifications -->
  <div id="toast" class="toast hidden"></div>

  <!-- Start / GameOver overlay -->
  <div id="overlay" class="overlay">
    <div class="card">
      <h1>Gravity Maze</h1>
      <p class="muted">
        Neige dein Handy (Gyroskop), ziehe mit dem Finger oder benutze <b>WASD</b> /
        Pfeiltasten, um die Kugel zu steuern.<br>
        Sammle <span class="gold">Münzen</span> und erreiche das
        <span class="green">Ziel</span>. Meide die <span class="purple">Löcher</span>!
      </p>
      <div class="btnrow">
        <button id="btnStart" class="cbtn primary">▶ Starten</button>
      </div>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script src="/static/main.js" defer></script>
</body>
</html>
